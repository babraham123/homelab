TrustedUserCAKeys C:\ProgramData\ssh\ca_ssh_key.pub
HostCertificate C:\ProgramData\ssh\ssh_host_key_cert.pub

Match User autoadmin
    # Force the dispatcher script for every connection
    ForceCommand C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -ExecutionPolicy Bypass -File "C:\Users\autoadmin\Dispatcher.ps1"
    # Disable all tunneling and interactive features
    AllowTcpForwarding no
    X11Forwarding no
    PermitTTY no
    AgentForwarding no
    # PermitTunnel is ignored/unsupported on Windows
